services:
  backend:
    build: ./test-analysis-service
    container_name: rigel-backend
    env_file:
      - ./test-analysis-service/.env
    ports:
      - "8020:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mentor:
    build: ./mentor-service
    container_name: rigel-mentor
    env_file:
      - ./mentor-service/.env
    ports:
      - "8021:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: rigel-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      mentor:
        condition: service_healthy
